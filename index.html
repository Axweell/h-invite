<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Et lite spørsmål til deg</title>

<meta property="og:title" content="Et lite spørsmål til deg 💌">
<meta property="og:description" content="Trykk deg gjennom – jeg har noe jeg lurer på …">
<meta property="og:image" content="https://EKSEMPEL.no/preview.png">
<meta property="og:type" content="website">
<meta name="theme-color" content="#BFE0EF">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --sky-1:#BFE0EF;
    --sky-2:#DCEFE6;
    --sky-3:#F6EAD2;
    --ink:#3f3228;
    --cream:#FFF8EF;
    --trail:#C9A56A;
    --heart:#E5556E;
    --dress:#F8A8C8;
    --grass-1:#8AC36A;
    --grass-2:#5F9E47;
    --line-bottom:30%;
    --actor-w:clamp(90px, 25vw, 130px);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    color:var(--ink);
    overflow:hidden;
    overscroll-behavior:none;
    background:linear-gradient(180deg,var(--sky-1) 0%,var(--sky-2) 50%,var(--sky-3) 100%);
    -webkit-tap-highlight-color:transparent;
  }
  button{font-family:'Fredoka',sans-serif; cursor:pointer; border:none; -webkit-user-select:none; user-select:none;}

  .stage{position:relative; width:100%; height:100dvh; overflow:hidden;}
  .stage::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 55% at 50% -6%, rgba(255,244,214,.85), transparent 60%);
  }

  /* ---------- landskap (sæter) ---------- */
  .scenery{position:absolute; left:0; right:0; bottom:29%; height:52%; z-index:0;}
  .scenery svg{width:100%; height:100%; display:block;}

  .ground{position:absolute; left:0; right:0; bottom:0; height:30%; z-index:1;
    background:linear-gradient(180deg,var(--grass-1),var(--grass-2));}
  .ground svg{position:absolute; inset:0; width:100%; height:100%;}

  .path{position:absolute; left:0; right:0; bottom:calc(var(--line-bottom) - 3px);
    height:0; border-top:4px dashed var(--trail); opacity:.7; z-index:2;}

  /* ---------- bakgrunns-hjerter ---------- */
  .ambient{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:2;}
  .ambient i{position:absolute; bottom:-30px; opacity:0; animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateY(0) rotate(0); opacity:0;}12%{opacity:.5;}100%{transform:translateY(-115dvh) rotate(40deg); opacity:0;}}

  /* ---------- tekstkort ---------- */
  .card-zone{position:absolute; left:0; right:0; top:7%; display:flex; justify-content:center; padding:0 18px; z-index:6;}
  .card{background:var(--cream); border-radius:22px; padding:18px 24px; max-width:440px; text-align:center;
    box-shadow:0 14px 34px rgba(90,60,50,.18); border:2px solid rgba(255,255,255,.7);}
  .card p{margin:0; font-family:'Caveat',cursive; font-weight:600; font-size:clamp(25px,6.6vw,38px); line-height:1.16;}
  .card.swap{animation:cardIn .55s cubic-bezier(.2,.8,.2,1);}
  @keyframes cardIn{from{opacity:0; transform:translateX(44px) translateY(4px) rotate(1.5deg);}to{opacity:1; transform:none;}}

  /* ---------- figurer ---------- */
  .actor{position:absolute; bottom:var(--line-bottom); width:var(--actor-w); transform:translateX(-50%); left:14%; z-index:3;
    transition:left 1.05s cubic-bezier(.45,0,.25,1), opacity .5s, transform .5s; will-change:left;}
  .actor svg{width:100%; height:auto; display:block; overflow:visible;}
  .actor.hide{opacity:0; pointer-events:none; transform:translateX(-50%) scale(.6);}
  .actor.pop{animation:pop .6s cubic-bezier(.2,1.4,.4,1);}
  @keyframes pop{from{transform:translateX(-50%) scale(.2);}to{transform:translateX(-50%) scale(1);}}
  .inner{transform-origin:bottom center;}
  .arm,.leg{transform-box:fill-box; transform-origin:center top;}

  .dance .inner{animation:danceBody .82s ease-in-out infinite;}
  .dance .arm-l{animation:armUpA .82s ease-in-out infinite;}
  .dance .arm-r{animation:armUpB .82s ease-in-out infinite;}
  .dance .leg-l{animation:kickA .82s ease-in-out infinite;}
  .dance .leg-r{animation:kickB .82s ease-in-out infinite;}
  @keyframes danceBody{0%{transform:translateY(0) rotate(-5deg);}25%{transform:translateY(-9px) rotate(0);}50%{transform:translateY(0) rotate(5deg);}75%{transform:translateY(-9px) rotate(0);}100%{transform:translateY(0) rotate(-5deg);}}
  @keyframes armUpA{0%,100%{transform:rotate(8deg);}50%{transform:rotate(-120deg);}}
  @keyframes armUpB{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(120deg);}}
  @keyframes kickA{0%,100%{transform:rotate(6deg);}50%{transform:rotate(-14deg);}}
  @keyframes kickB{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(14deg);}}

  .walk .inner{animation:walkBob .5s ease-in-out infinite;}
  .walk .leg-l{animation:stepA .5s ease-in-out infinite;}
  .walk .leg-r{animation:stepB .5s ease-in-out infinite;}
  .walk .arm-l{animation:stepB .5s ease-in-out infinite;}
  .walk .arm-r{animation:stepA .5s ease-in-out infinite;}
  @keyframes walkBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  @keyframes stepA{0%,100%{transform:rotate(16deg);}50%{transform:rotate(-16deg);}}
  @keyframes stepB{0%,100%{transform:rotate(-16deg);}50%{transform:rotate(16deg);}}

  .lovestruck .inner{animation:floaty 2.1s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-7px) rotate(1.5deg);}}

  .talk .inner{animation:nod 1.5s ease-in-out infinite;}
  .talk .arm-r{animation:gesture 1.5s ease-in-out infinite;}
  @keyframes nod{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(2deg);}}
  @keyframes gesture{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(-42deg);}}

  .hopeful .inner{animation:hope 1.4s ease-in-out infinite;}
  @keyframes hope{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}

  .celebrate .inner{animation:jumpJoy .56s ease-in-out infinite;}
  .celebrate .arm-l{animation:clapA .56s ease-in-out infinite;}
  .celebrate .arm-r{animation:clapB .56s ease-in-out infinite;}
  @keyframes jumpJoy{0%{transform:translateY(0);}30%{transform:translateY(-34px);}55%{transform:translateY(0);}70%{transform:translateY(-8px);}100%{transform:translateY(0);}}
  @keyframes clapA{0%,100%{transform:rotate(-95deg) translateX(0);}50%{transform:rotate(-125deg) translateX(6px);}}
  @keyframes clapB{0%,100%{transform:rotate(95deg) translateX(0);}50%{transform:rotate(125deg) translateX(-6px);}}

  .eyes-heart,.sunglasses{display:none;}
  .blush{opacity:0; transition:opacity .4s;}
  .shades .eyes-normal{display:none;}
  .shades .sunglasses{display:block;}
  .love:not(.shades) .eyes-normal{display:none;}
  .love:not(.shades) .eyes-heart{display:block;}
  .love .blush{opacity:1;}

  .fx{position:absolute; inset:0; pointer-events:none; opacity:0; transition:opacity .4s; z-index:4;}
  .fx.on{opacity:1;}
  .fx span{position:absolute; bottom:34%; animation:rise 2.4s ease-in infinite;}
  .fx span:nth-child(1){left:42%; animation-delay:0s; font-size:22px;}
  .fx span:nth-child(2){left:50%; animation-delay:.5s; font-size:16px;}
  .fx span:nth-child(3){left:57%; animation-delay:.9s; font-size:22px;}
  .fx span:nth-child(4){left:46%; animation-delay:1.3s; font-size:18px;}
  .fx span:nth-child(5){left:53%; animation-delay:1.7s; font-size:26px;}
  @keyframes rise{0%{transform:translateY(0) scale(.6); opacity:0;}20%{opacity:1;}100%{transform:translateY(-120px) scale(1.1); opacity:0;}}

  /* ---------- kontroller ---------- */
  .controls{position:absolute; left:0; right:0; bottom:max(22px, env(safe-area-inset-bottom)); display:flex; flex-direction:column; align-items:center; gap:14px; z-index:6;}
  .dots{display:flex; gap:8px;}
  .dots b{width:8px; height:8px; border-radius:50%; background:rgba(90,60,50,.25); transition:.3s;}
  .dots b.active{background:var(--heart); transform:scale(1.35);}
  .btn{background:var(--ink); color:#fff; font-size:18px; font-weight:500; padding:13px 30px; border-radius:999px; box-shadow:0 8px 20px rgba(63,50,40,.28); transition:transform .15s;}
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:3px solid var(--heart); outline-offset:3px;}

  /* ---------- ja / nei ---------- */
  .yesno{position:absolute; inset:0; display:none; z-index:7;}
  .yesno.show{display:block;}
  .yesno-row{position:absolute; left:0; right:0; bottom:48%; display:flex; justify-content:center; gap:18px; align-items:center;}
  .btn-ja{background:var(--heart); color:#fff; font-size:clamp(22px,6.4vw,30px); font-weight:600; padding:15px 40px; border-radius:999px;
    box-shadow:0 10px 26px rgba(229,85,110,.45); transition:transform .18s;}
  .btn-ja:hover{transform:scale(1.05);}
  .btn-ja:focus-visible{outline:3px solid var(--ink); outline-offset:3px;}
  .btn-nei{background:#fff; color:var(--ink); font-size:clamp(18px,5vw,22px); font-weight:500; padding:13px 30px; border-radius:999px;
    box-shadow:0 6px 16px rgba(90,60,50,.2); transition:left .22s ease, top .22s ease, transform .22s;}
  .btn-nei.loose{position:fixed; z-index:30;}

  /* ---------- kalender ---------- */
  .calendar{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) scale(.92); width:min(440px,92vw);
    background:var(--cream); border-radius:24px; padding:20px 18px 22px; box-shadow:0 20px 50px rgba(90,60,50,.28);
    border:2px solid rgba(255,255,255,.8); opacity:0; pointer-events:none; transition:opacity .5s, transform .5s;
    max-height:86dvh; overflow:auto; z-index:20;}
  .calendar.on{opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1);}
  .calendar h2{margin:2px 0; text-align:center; font-family:'Caveat',cursive; font-weight:700; font-size:32px;}
  .calendar .sub{margin:0 0 14px; text-align:center; font-size:15px; opacity:.75;}
  .cal-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .chip{background:#fff; border:2px solid rgba(90,60,50,.14); border-radius:14px; padding:9px 4px; text-align:center; font-size:12px; line-height:1.25; color:var(--ink); transition:.15s;}
  .chip span{display:block;}
  .chip b{display:block; font-size:18px; font-weight:600;}
  .chip:hover{border-color:var(--dress);}
  .chip.sel{background:var(--dress); border-color:var(--dress); color:#fff; transform:translateY(-2px);}
  .chip:focus-visible{outline:3px solid var(--heart); outline-offset:2px;}
  .cal-actions{margin-top:16px; text-align:center;}
  .send{background:var(--heart); color:#fff; font-size:19px; font-weight:600; padding:14px 34px; border-radius:999px; box-shadow:0 10px 24px rgba(229,85,110,.4); transition:transform .15s, opacity .2s;}
  .send:disabled{opacity:.45; cursor:not-allowed;}
  .send:not(:disabled):hover{transform:translateY(-2px);}
  .cal-hint{margin:12px 0 0; text-align:center; font-size:14px; min-height:18px;}
  .cal-note{display:none; margin:14px 4px 2px; text-align:center; font-family:'Caveat',cursive; font-weight:600; font-size:21px; line-height:1.2; color:var(--ink);}
  .cal-note.show{display:block;}
  #takk{text-align:center; padding:14px 6px 8px;}
  .takk-vid{width:210px; max-width:64%; border-radius:18px; display:block; margin:2px auto 0; box-shadow:0 10px 24px rgba(90,60,50,.22);}
  .takk-msg{margin:14px 6px 6px; font-family:'Caveat',cursive; font-weight:700; font-size:32px; line-height:1.18; color:var(--ink);}
  .takk-sub{margin:0; font-size:16px; opacity:.75;}

  .konf{position:fixed; top:-24px; pointer-events:none; z-index:40; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110dvh) rotate(540deg); opacity:0;}}

  @media (prefers-reduced-motion:reduce){
    .ambient,.fx span{display:none;}
    .inner,.arm,.leg{animation:none !important;}
  }
</style>
</head>

<div class="stage" id="stage">

        <path d="M0 6 q6 -10 12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 l8 0 L400 30 L0 30 Z"/>
      </g>
      <g>
        <g transform="translate(50,60)"><circle cx="0" cy="-4" r="2.6" fill="#fff"/><circle cx="0" cy="4" r="2.6" fill="#fff"/><circle cx="-4" cy="0" r="2.6" fill="#fff"/><circle cx="4" cy="0" r="2.6" fill="#fff"/><circle r="2" fill="#FFD36B"/></g>
        <g transform="translate(130,90)"><circle cx="0" cy="-4" r="2.6" fill="#FFC0D8"/><circle cx="0" cy="4" r="2.6" fill="#FFC0D8"/><circle cx="-4" cy="0" r="2.6" fill="#FFC0D8"/><circle cx="4" cy="0" r="2.6" fill="#FFC0D8"/><circle r="2" fill="#FFD36B"/></g>
        <g transform="translate(220,55)"><circle cx="0" cy="-4" r="2.6" fill="#fff"/><circle cx="0" cy="4" r="2.6" fill="#fff"/><circle cx="-4" cy="0" r="2.6" fill="#fff"/><circle cx="4" cy="0" r="2.6" fill="#fff"/><circle r="2" fill="#FFD36B"/></g>
        <g transform="translate(300,95)"><circle cx="0" cy="-4" r="2.6" fill="#fff"/><circle cx="0" cy="4" r="2.6" fill="#fff"/><circle cx="-4" cy="0" r="2.6" fill="#fff"/><circle cx="4" cy="0" r="2.6" fill="#fff"/><circle r="2" fill="#FFD36B"/></g>
        <g transform="translate(360,62)"><circle cx="0" cy="-4" r="2.6" fill="#FFC0D8"/><circle cx="0" cy="4" r="2.6" fill="#FFC0D8"/><circle cx="-4" cy="0" r="2.6" fill="#FFC0D8"/><circle cx="4" cy="0" r="2.6" fill="#FFC0D8"/><circle r="2" fill="#FFD36B"/></g>

  <div class="path"></div>
  <div class="ambient" id="ambient"></div>

  <div class="card-zone"><div class="card" id="card"><p id="cardText">…</p></div></div>

  <div class="fx" id="fx"><span>💛</span><span>💕</span><span>💖</span><span>✨</span><span>💗</span></div>

  <!-- JENTA -->
  <div class="actor girl hide" id="girl" style="left:72%;">
    <div class="inner">
      <svg viewBox="0 0 140 230" aria-hidden="true">
        <!-- langt blondt hår bak -->
        <path d="M24 58 Q14 130 40 156 L46 70 Z" fill="#E9C877"/>
        <path d="M116 58 Q126 130 100 156 L94 70 Z" fill="#E9C877"/>
        <path d="M28 70 Q22 120 38 150" stroke="#D9B45E" stroke-width="2" fill="none" opacity=".6"/>

  <!-- JA / NEI -->
  <div class="yesno" id="yesno">
    <div class="yesno-row">
      <button class="btn-ja" id="jaBtn">Ja</button>
      <button class="btn-nei" id="neiBtn" tabindex="-1">Nei</button>
    </div>
  </div>

  <!-- KALENDER -->
  <div class="calendar" id="calendar">
    <div id="calForm">
      <h2>Når passer det?</h2>
      <p class="sub">Velg gjerne flere dager 💛</p>
      <div class="cal-grid" id="calGrid"></div>
      <p class="cal-note" id="calNote">Jeg kommer tilbake med sted og tid når jeg har funnet noen datoer som passer for deg 💛</p>
      <div class="cal-actions">
        <button class="send" id="sendBtn" disabled>Send svar 💌</button>
        <p class="cal-hint" id="calHint"></p>
      </div>
    </div>
    <div id="takk" hidden>
      <video id="takkVid" class="takk-vid" muted loop playsinline preload="none">
        <source src="glad-hund.mp4" type="video/mp4">
      </video>
      <p class="takk-msg">Jeg gleder meg veldig til å gå ut med deg igjen!</p>
      <p class="takk-sub">Vi snakkes snart 💛</p>
    </div>
  </div>

  <div class="controls" id="controls">
    <div class="dots" id="dots"></div>
    <button class="btn" id="nextBtn">Neste →</button>
  </div>

</div>

<script>
/* =====================================================================
   INNSTILLINGER – endre disse to linjene
   ===================================================================== */
const CONFIG = {
  // Gratis e-postlevering via FormSubmit – ingen konto eller nøkkel nødvendig.
  // Første gang du tester får du en bekreftelsesmail fra FormSubmit – klikk
  // "Activate Form" der. Etter det leveres alle submissions automatisk.
  mottakerEpost: "axel.fagerbakke@gmail.com",
};
const STARTDATO = new Date(2026, 5, 30); // første dag: 30. juni 2026
const SLUTTDATO = new Date(2026, 6, 12); // siste dag: 12. juli 2026
const EKSKLUDER = ["2026-06-30","2026-07-03"]; // tir 30. juni og fre 3. juli tas ut
/* ===================================================================== */

const UKEDAG = ["søn","man","tir","ons","tor","fre","lør"];
const MND = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

const SCENES = [
  { text:"Jeg var i bryllup i helgen …",                                                     boyX:14, shades:true,  boy:"dance",      girl:false },
  { text:"Det var et nydelig bryllup – men jeg klarte egentlig bare å fokusere på én ting.", boyX:34, shades:true,  boy:"walk",       girl:false },
  { text:"Den fineste jenta der.",                                                           boyX:44, shades:false, boy:"lovestruck", girl:true,  girlX:71, girlPose:"dance" },
  { text:"Jeg var så heldig å få snakke med henne – og nå lurer jeg på noe …",               boyX:38, shades:false, boy:"talk",       girl:true,  girlX:66, girlPose:"talk" },
  { text:"Vil hun gå ut med meg igjen?",                                                     boyX:38, shades:false, boy:"hopeful",    girl:true,  girlX:66, girlPose:"hopeful", ui:"yesno" },
  { text:"Når passer det?",                                                                  boyX:36, shades:false, boy:"celebrate",  girl:true,  girlX:60, girlPose:"celebrate", ui:"calendar" },
];

const boy=document.getElementById("boy"), girl=document.getElementById("girl");
const card=document.getElementById("card"), cardText=document.getElementById("cardText");
const fx=document.getElementById("fx"), dots=document.getElementById("dots");
const nextBtn=document.getElementById("nextBtn"), controls=document.getElementById("controls");
const yesno=document.getElementById("yesno"), jaBtn=document.getElementById("jaBtn"), neiBtn=document.getElementById("neiBtn");
const calendar=document.getElementById("calendar"), stage=document.getElementById("stage");

let i = 0;
const POSES = ["dance","walk","lovestruck","talk","hopeful","celebrate"];
function setActor(el, pose, love, shades){
  el.classList.remove(...POSES,"love","shades");
  if(pose) el.classList.add(pose);
  if(love) el.classList.add("love");
  if(shades) el.classList.add("shades");
}

function render(){
  const s = SCENES[i];
  cardText.textContent = s.text;
  card.classList.remove("swap"); void card.offsetWidth; card.classList.add("swap");

  const boyLove = s.boy==="lovestruck" || s.boy==="celebrate";
  setActor(boy, s.boy, boyLove, s.shades);
  boy.style.left = s.boyX + "%";

  if(s.girl){
    if(girl.classList.contains("hide")){ girl.classList.remove("hide"); girl.classList.add("pop"); }
    const girlLove = s.girlPose==="celebrate";   // hjerter KUN ved feiring – ikke når de snakker
    setActor(girl, s.girlPose, girlLove, false);
    girl.style.left = (s.girlX||72) + "%";
  } else {
    girl.classList.add("hide");
  }

  fx.classList.toggle("on", boyLove);

  yesno.classList.toggle("show", s.ui==="yesno");
  calendar.classList.toggle("on", s.ui==="calendar");
  controls.style.display = s.ui ? "none" : "flex";

  if(s.ui==="yesno") resetNei();
  if(s.ui==="calendar"){ feiring(); shrinkActors(); }
  drawDots();
}

function drawDots(){
  dots.innerHTML="";
  SCENES.forEach((_,n)=>{ const b=document.createElement("b"); if(n===i) b.classList.add("active"); dots.appendChild(b); });
}

nextBtn.addEventListener("click", ()=>{ if(i < SCENES.length-1){ i++; render(); }});

/* ---------- NEI: står stille til man prøver å trykke ---------- */
const NEI_TEKST = ["Nei","Sikker?","Helt sikker?","Tenk deg om 😅","Du mener Ja 😄","Prøv igjen 💛"];
let neiN = 0;
function resetNei(){ neiN=0; neiBtn.textContent="Nei"; neiBtn.classList.remove("loose"); neiBtn.style.left=""; neiBtn.style.top=""; jaBtn.style.transform=""; }
function rektOverlapp(ax,ay,aw,ah, bx,by,bw,bh){
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function flyttNei(){
  neiBtn.classList.add("loose");
  const w=window.innerWidth, h=window.innerHeight;
  const bw=neiBtn.offsetWidth||90, bh=neiBtn.offsetHeight||46;
  // sentral sone – aldri helt ut til kanten
  const minX=w*0.16, maxX=Math.max(w*0.16, w*0.84 - bw);
  const minY=h*0.24, maxY=Math.max(h*0.24, h*0.66 - bh);
  // Ja-knappens flate (med margin) – Nei skal aldri legge seg oppå den
  const ja=jaBtn.getBoundingClientRect(); const m=16;
  let x,y,n=0;
  do{
    x=minX + Math.random()*(maxX-minX);
    y=minY + Math.random()*(maxY-minY);
    n++;
  } while(n<30 && rektOverlapp(x,y,bw,bh, ja.left-m, ja.top-m, ja.width+2*m, ja.height+2*m));
  neiBtn.style.left=x+"px";
  neiBtn.style.top=y+"px";
  neiN=Math.min(neiN+1, NEI_TEKST.length-1);
  neiBtn.textContent=NEI_TEKST[neiN];
  jaBtn.style.transform="scale("+(1+neiN*0.06)+")";
}
// flytter seg KUN når man forsøker å trykke (ikke på hover)
neiBtn.addEventListener("pointerdown", e=>{ e.preventDefault(); flyttNei(); });
neiBtn.addEventListener("click", e=>{ e.preventDefault(); flyttNei(); });

/* ---------- JA ---------- */
jaBtn.addEventListener("click", ()=>{
  setActor(boy, "celebrate", true, false);
  if(SCENES[i].girl) setActor(girl, "celebrate", true, false);
  fx.classList.add("on");
  feiring();
  yesno.classList.remove("show");
  cardText.textContent="Jaddaaa!";
  card.classList.remove("swap"); void card.offsetWidth; card.classList.add("swap");
  controls.style.display="flex";
  nextBtn.textContent="Når passer det? →";
});

/* ---------- KALENDER ---------- */
function shrinkActors(){ [boy,girl].forEach(a=>{ a.style.bottom="58%"; a.style.width="74px"; }); }
const valgt = new Set();
const calGrid=document.getElementById("calGrid"), sendBtn=document.getElementById("sendBtn");
const calHint=document.getElementById("calHint");
const calNote=document.getElementById("calNote");

function byggKalender(){
  calGrid.innerHTML="";
  const start=new Date(STARTDATO); start.setHours(0,0,0,0);
  const slutt=new Date(SLUTTDATO); slutt.setHours(0,0,0,0);
  for(let d=new Date(start); d<=slutt; d.setDate(d.getDate()+1)){
    const cur=new Date(d);
    const pad=v=>String(v).padStart(2,"0");
    const iso=cur.getFullYear()+"-"+pad(cur.getMonth()+1)+"-"+pad(cur.getDate());
    if(EKSKLUDER.includes(iso)) continue;
    const chip=document.createElement("button");
    chip.className="chip";
    chip.innerHTML="<span>"+UKEDAG[cur.getDay()]+"</span><b>"+cur.getDate()+".</b><span>"+MND[cur.getMonth()]+"</span>";
    chip.setAttribute("aria-pressed","false");
    chip.addEventListener("click", ()=>{
      if(valgt.has(iso)){ valgt.delete(iso); chip.classList.remove("sel"); chip.setAttribute("aria-pressed","false"); }
      else { valgt.add(iso); chip.classList.add("sel"); chip.setAttribute("aria-pressed","true"); }
      sendBtn.disabled = valgt.size===0;
      calNote.classList.toggle("show", valgt.size>0);
    });
    calGrid.appendChild(chip);
  }
}
byggKalender();

function pentDato(iso){ const d=new Date(iso+"T00:00:00"); return UKEDAG[d.getDay()]+" "+d.getDate()+". "+MND[d.getMonth()]; }

function visTakk(){
  document.getElementById("calForm").hidden = true;
  document.getElementById("takk").hidden = false;
  const v=document.getElementById("takkVid");
  if(v){ v.play().catch(()=>{}); }
  feiring();
}

sendBtn.addEventListener("click", async ()=>{
  if(valgt.size===0) return;
  sendBtn.disabled = true;
  calHint.textContent = "Sender …";
  const dager = [...valgt].sort().map(pentDato).join(", ");
  const params = new URLSearchParams(location.search);
  const debug = params.has("debug");
  try{
    if(CONFIG.mottakerEpost){
      const fd = new FormData();
      fd.append("name", "Hun");
      fd.append("email", "noreply@invitasjon.local");
      fd.append("message", "Datoer som passer henne: " + dager);
      fd.append("_subject", "Hun sa JA - datoer som passer");
      fd.append("_template", "table");
      fd.append("_captcha", "false");
      const res = await fetch("https://formsubmit.co/ajax/" + encodeURIComponent(CONFIG.mottakerEpost), {
        method:"POST",
        headers:{ "Accept":"application/json" },
        body: fd
      });
      const data = await res.json().catch(()=>({success:"false", message:"Ugyldig JSON-svar (HTTP "+res.status+")"}));
      console.log("FormSubmit-status:", res.status, data);
      const ok = data.success === true || data.success === "true";
      if(!ok){
        if(debug) alert("FormSubmit feilet ("+res.status+"): " + (data.message || JSON.stringify(data)));
        else console.warn("FormSubmit svarte:", data);
      } else if(debug){
        alert("FormSubmit OK: " + (data.message || "sendt"));
      }
    } else {
      console.warn("Mangler mottakerEpost i CONFIG – e-post ble IKKE sendt (forhåndsvisning).");
    }
  }catch(err){
    console.warn("Sending feilet:", err);
    if(debug) alert("Nettverksfeil: " + err.message);
  }
  // hun får alltid den fine bekreftelsen, uansett nett
  visTakk();
});

/* ---------- bakgrunns-hjerter ---------- */
(function ambient(){
  const wrap=document.getElementById("ambient"); const ikon=["💛","💕","🤍","✨","💗"];
  for(let n=0;n<11;n++){ const e=document.createElement("i"); e.textContent=ikon[n%ikon.length];
    e.style.left=(Math.random()*100)+"%"; e.style.animationDuration=(7+Math.random()*7)+"s";
    e.style.animationDelay=(Math.random()*8)+"s"; e.style.fontSize=(12+Math.random()*16)+"px"; wrap.appendChild(e); }
})();

/* ---------- konfetti ---------- */
function feiring(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const ikon=["💛","💕","💖","✨","🎉","💗"];
  for(let n=0;n<26;n++){ const e=document.createElement("div"); e.className="konf";
    e.textContent=ikon[Math.floor(Math.random()*ikon.length)]; e.style.left=(Math.random()*100)+"vw";
    e.style.fontSize=(14+Math.random()*16)+"px"; e.style.animationDuration=(1.8+Math.random()*1.6)+"s";
    document.body.appendChild(e); setTimeout(()=>e.remove(), 3600); }
}

render();
</script>
</body>
